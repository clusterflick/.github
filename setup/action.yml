name: Setup
description: Checkout, Node, cache paths, and a network-resilient dependency install for Clusterflick pipeline jobs. Retries npm install (and, optionally, the Playwright browser download) so a transient registry blip doesn't fail the whole job.
inputs:
  playwright:
    description: Set to "true" to install Playwright browsers with system dependencies (for jobs that scrape via a browser).
    default: "false"
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
    - uses: clusterflick/.github/setup-cache-paths@main
    - name: Install dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 30
        # --fetch-retries adds npm's own internal retry as a first line of
        # defence; the retry wrapper catches the cases npm still gives up on.
        command: npm install --fetch-retries 5 --fetch-retry-maxtimeout 120000
    - name: Install Playwright browsers
      if: inputs.playwright == 'true'
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 15
        max_attempts: 3
        retry_wait_seconds: 30
        command: npx playwright install --with-deps
