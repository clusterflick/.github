name: zizmor

# Reusable workflow that audits a repository's GitHub Actions workflows with
# zizmor (https://docs.zizmor.sh). Other repos call it via:
#
#   jobs:
#     zizmor:
#       uses: clusterflick/.github/.github/workflows/zizmor.yml@main
#       permissions:
#         contents: read
#
# The push/pull_request triggers below let this repo audit its own workflows.

on:
  workflow_call:
    inputs:
      persona:
        description: "zizmor auditing persona: regular, pedantic, or auditor"
        type: string
        default: regular
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  audit:
    name: Audit workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Write shared zizmor policy
        # Org-wide policy, kept here so it applies to every repo that calls
        # this workflow without needing a .github/zizmor.yml in each one.
        # ref-pin: allow tag/branch refs (e.g. @v6) instead of requiring a
        # commit hash. Note this also permits moving refs like @latest/@main.
        #
        # The action runs zizmor in a container that mounts only
        # GITHUB_WORKSPACE (at /workspace, its cwd), so the config has to live
        # in the workspace and be passed as a workspace-relative path.
        run: |
          cat > "${GITHUB_WORKSPACE}/zizmor-policy.yml" <<'EOF'
          rules:
            unpinned-uses:
              config:
                policies:
                  "*": ref-pin
          EOF
      - uses: zizmorcore/zizmor-action@v0.5.6
        with:
          persona: ${{ inputs.persona || 'regular' }}
          config: zizmor-policy.yml
          # Only fail the gate on medium+ findings. Low/informational
          # advisories (e.g. step-output template expansion, "use gh release
          # instead of an action") still appear in the logs but don't block.
          min-severity: medium
          # Fail the job (and so the PR check) when zizmor reports findings,
          # and surface them as inline annotations on the diff. To instead
          # upload SARIF to the GitHub Security tab, set advanced-security to
          # true, drop annotations, and add `security-events: write` to the
          # job permissions above (note: in that mode the job no longer fails
          # on findings — gate via a branch ruleset instead).
          advanced-security: false
          annotations: true
